<script>
// ============================================================
// CSV-парсинг
// ============================================================
function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i + 1];
    if (inQuotes) {
      if (c === '"' && next === '"') { cell += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { cell += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (c === '\r') {}
      else { cell += c; }
    }
  }
  if (cell.length > 0 || row.length > 0) {
    row.push(cell);
    if (row.some(c => c.length > 0)) rows.push(row);
  }
  return rows;
}

function rowsToViewers(rows) {
  if (rows.length < 2) return {};
  const headers = rows[0].map(h => h.trim().toLowerCase());
  const nickIdx = headers.indexOf('ник') >= 0 ? headers.indexOf('ник') : headers.indexOf('nick');
  const avatarIdx = headers.indexOf('аватар') >= 0 ? headers.indexOf('аватар') : headers.indexOf('avatar_url');
  if (nickIdx < 0) return {};
  const map = {};
  rows.slice(1).forEach(r => {
    if (r.length > 0 && r[nickIdx] && r[nickIdx].trim()) {
      const nick = r[nickIdx].trim();
      map[nick.toLowerCase()] = {
        nick: nick,
        avatar: avatarIdx >= 0 ? (r[avatarIdx] || '').trim() : '',
      };
    }
  });
  return map;
}

function colIndex(headers, name) {
  return headers.indexOf(name.toLowerCase());
}

function num(r, idx) {
  if (idx < 0 || idx >= r.length) return 0;
  return parseInt((r[idx] || '0').trim(), 10) || 0;
}

function rowsToTickets(rows, viewersMap) {
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim().toLowerCase());

  const idx = {
    nick:    colIndex(headers, 'ник'),
    gold_ppk:    colIndex(headers, 'золото_ппк'),
    gold_ilyich: colIndex(headers, 'золото_ильич'),
    gold_dipsy:  colIndex(headers, 'золото_дипси'),
    silver_ppk:    colIndex(headers, 'серебро_ппк'),
    silver_ilyich: colIndex(headers, 'серебро_ильич'),
    silver_dipsy:  colIndex(headers, 'серебро_дипси'),
    tickets: colIndex(headers, 'билеты'),
    avatar:  colIndex(headers, 'аватар'),
  };

  if (idx.nick < 0 || idx.tickets < 0) return [];

  return rows.slice(1)
    .filter(r => r.length > 0 && r[idx.nick] && r[idx.nick].trim())
    .map(r => {
      const nick = (r[idx.nick] || '').trim();
      const viewer = viewersMap[nick.toLowerCase()] || {};
      const avatarFromSheet = idx.avatar >= 0 ? (r[idx.avatar] || '').trim() : '';
      return {
        nick: nick,
        avatar: viewer.avatar || avatarFromSheet || '',
        tickets:       num(r, idx.tickets),
        gold_ppk:      num(r, idx.gold_ppk),
        gold_ilyich:   num(r, idx.gold_ilyich),
        gold_dipsy:    num(r, idx.gold_dipsy),
        silver_ppk:    num(r, idx.silver_ppk),
        silver_ilyich: num(r, idx.silver_ilyich),
        silver_dipsy:  num(r, idx.silver_dipsy),
      };
    })
    .filter(t => t.tickets > 0)
    .sort((a, b) => b.tickets - a.tickets);
}

function rowsToConfig(rows) {
  if (rows.length < 2) return {};
  const headers = rows[0].map(h => h.trim().toLowerCase());
  const keyIdx = headers.indexOf('key');
  const valIdx = headers.indexOf('value');
  if (keyIdx < 0 || valIdx < 0) return {};
  const config = {};
  rows.slice(1).forEach(r => {
    if (r.length > 0 && r[keyIdx]) {
      config[r[keyIdx].trim().toLowerCase()] = (r[valIdx] || '').trim();
    }
  });
  return config;
}

function initials(nick) {
  const clean = nick.replace(/[^A-Za-zА-Яа-я0-9]/g, '');
  if (clean.length >= 2) return (clean[0] + clean[1]).toUpperCase();
  return (clean[0] || '?').toUpperCase();
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ============================================================
// Web Audio — "поп" при раскрытии карточки
// ============================================================
let audioCtx = null;
function playPop() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(420, t);
    osc.frequency.exponentialRampToValueAtTime(180, t + 0.10);

    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.18, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.15);
  } catch (e) { /* тихо игнорируем */ }
}

// ============================================================
// Шапка
// ============================================================
function setupHeader(config) {
  const hero = document.getElementById('hero');
  const heroBg = document.getElementById('hero-bg');

  if (config.header_banner_url) {
    heroBg.style.backgroundImage = `url('${config.header_banner_url}')`;
    hero.classList.remove('no-bg');
  } else {
    heroBg.style.backgroundImage = '';
    hero.classList.add('no-bg');
  }

  if (config.event_title) document.getElementById('event-title').textContent = config.event_title;
  if (config.event_subtitle) document.getElementById('event-subtitle').textContent = config.event_subtitle;

  renderStreamers(config);
}

const STREAMER_SLOTS = [
  { idx: 1, klass: 's-ppk' },
  { idx: 2, klass: 's-ilyich' },
  { idx: 3, klass: 's-dipsy' },
];

function renderStreamers(config) {
  const container = document.getElementById('streamers');
  if (!container) return;

  const cards = STREAMER_SLOTS.map(slot => {
    const nick = (config[`streamer${slot.idx}_nick`] || '').trim();
    if (!nick) return '';
    const avatar = (config[`streamer${slot.idx}_avatar_url`] || '').trim();
    const url = (config[`streamer${slot.idx}_twitch_url`] || '').trim();
    const avatarHtml = avatar
      ? `<div class="streamer-avatar" style="background-image:url('${esc(avatar)}');"></div>`
      : `<div class="streamer-avatar">${esc(initials(nick))}</div>`;
    const tag = url ? 'a' : 'div';
    const attrs = url
      ? `href="${esc(url)}" target="_blank" rel="noopener noreferrer"`
      : '';
    return `<${tag} class="streamer-card ${slot.klass}" ${attrs}>${avatarHtml}<div class="streamer-nick">${esc(nick)}</div></${tag}>`;
  }).join('');

  container.innerHTML = cards;
}

// ============================================================
// Рендер блока разбивки по стримерам (общий для подиума и раскрытой карточки)
// ============================================================
function streamerBlock(klass, gold, silver) {
  const goldHtml = `<div class="sb-tier gold" title="Золото — без лимита">🟡 ${gold}</div>`;
  const silverHtml = `
    <div class="sb-tier silver" title="Серебро — лимит 100">
      ⚪ ${silver}<span class="sb-cap">/100</span>
    </div>
  `;
  return `<div class="streamer-block ${klass}">${goldHtml}${silverHtml}</div>`;
}

function streamerBreakdown(t, wrapperClass) {
  return `
    <div class="${wrapperClass}">
      ${streamerBlock('s-ppk',    t.gold_ppk,    t.silver_ppk)}
      ${streamerBlock('s-ilyich', t.gold_ilyich, t.silver_ilyich)}
      ${streamerBlock('s-dipsy',  t.gold_dipsy,  t.silver_dipsy)}
    </div>
  `;
}

function dotsBar(t) {
  const has = (g, s) => g > 0 || s > 0;
  return `
    <span class="ticket-dots">
      <span class="ticket-dot s-ppk${has(t.gold_ppk, t.silver_ppk) ? '' : ' faded'}" title="ПариПариКай"></span>
      <span class="ticket-dot s-ilyich${has(t.gold_ilyich, t.silver_ilyich) ? '' : ' faded'}" title="Ильич"></span>
      <span class="ticket-dot s-dipsy${has(t.gold_dipsy, t.silver_dipsy) ? '' : ' faded'}" title="Дипси"></span>
    </span>
  `;
}

// ============================================================
// Подиум
// ============================================================
function buildAvatar(t, sizeClass) {
  if (t.avatar) return `<div class="${sizeClass}" style="background-image:url('${esc(t.avatar)}');"></div>`;
  return `<div class="${sizeClass}">${esc(initials(t.nick))}</div>`;
}

function renderPodium(top3) {
  const podium = document.getElementById('podium');
  // Порядок: 2-е, 1-е, 3-е (классический подиум)
  const order = [top3[1], top3[0], top3[2]];
  const positions = [2, 1, 3];
  const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };

  podium.innerHTML = order.map((t, i) => {
    if (!t) return '<div></div>';
    const pos = positions[i];
    return `
      <div class="podium-card p-${pos}">
        <div class="podium-medal">${medals[pos]}</div>
        ${buildAvatar(t, 'podium-avatar')}
        <div class="podium-nick">${esc(t.nick)}</div>
        ${streamerBreakdown(t, 'streamer-breakdown')}
        <div>
          <span class="ticket-total-label">всего билетов</span>
          <span class="ticket-total">🎟️ ${t.tickets}</span>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('podium-wrap').style.display = 'block';
}

// ============================================================
// Сетка остальных — компактная карточка с раскрытием
// ============================================================
function renderTicketCard(t, rank) {
  return `
    <div class="ticket-card" data-nick="${esc(t.nick.toLowerCase())}">
      <div class="ticket-rank">#${rank}</div>
      <div class="expand-icon">▼</div>
      <div class="ticket-summary">
        ${buildAvatar(t, 'ticket-avatar')}
        <div class="ticket-info">
          <div class="ticket-nick">${esc(t.nick)}</div>
          <div class="ticket-summary-row">
            <span class="ticket-total-mini">🎟️ ${t.tickets}</span>
            ${dotsBar(t)}
          </div>
        </div>
      </div>
      <div class="ticket-details">
        ${streamerBreakdown(t, 'breakdown-compact')}
      </div>
    </div>
  `;
}

function renderGrid(rest, startRank = 4) {
  const grid = document.getElementById('grid');
  if (rest.length === 0) {
    grid.innerHTML = '';
    document.getElementById('rest-wrap').style.display = 'none';
    return;
  }
  grid.innerHTML = rest.map((t, i) => renderTicketCard(t, startRank + i)).join('');
  document.getElementById('rest-wrap').style.display = 'block';
  attachExpandHandlers();
}

function attachExpandHandlers() {
  document.querySelectorAll('.ticket-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('a')) return;
      const wasExpanded = card.classList.contains('expanded');
      card.classList.toggle('expanded');
      if (!wasExpanded) playPop();
    });
  });
}

// ============================================================
// Состояние и фильтр
// ============================================================
let allTickets = [];

function applyFilters() {
  const search = (document.getElementById('search-input').value || '').trim().toLowerCase();
  let filtered = allTickets;
  if (search) filtered = allTickets.filter(t => t.nick.toLowerCase().includes(search));

  const podiumWrap = document.getElementById('podium-wrap');
  const restWrap = document.getElementById('rest-wrap');
  const grid = document.getElementById('grid');

  if (search) {
    // В режиме поиска — скрываем подиум, всё в сетку
    podiumWrap.style.display = 'none';
    if (filtered.length === 0) {
      restWrap.style.display = 'block';
      grid.innerHTML = '<div class="no-results">Никого не нашли по этому нику</div>';
    } else {
      grid.innerHTML = filtered.map(t => {
        const rank = allTickets.indexOf(t) + 1;
        return renderTicketCard(t, rank);
      }).join('');
      restWrap.style.display = 'block';
      attachExpandHandlers();
    }
    return;
  }

  // Без поиска — подиум + сетка
  const top3 = filtered.slice(0, 3);
  const rest = filtered.slice(3);

  if (top3.length > 0) renderPodium(top3);
  else podiumWrap.style.display = 'none';

  renderGrid(rest);
}

document.getElementById('search-input').addEventListener('input', applyFilters);

// ============================================================
// Загрузка данных
// ============================================================
let viewersMap = {};

async function loadAll() {
  const status = document.getElementById('status');
  const content = document.getElementById('content');

  if (!TICKETS_CSV_URL || TICKETS_CSV_URL === 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4e5Snl5FT-EdbjHQKKML7Ze1kNgpYcgx2MtrYWmkIPK32fHBTRfw7i3aKckWVvT6OoOQfOrQlyD6_/pubhtml?gid=1111321722&single=true') {
    status.classList.add('error');
    status.innerHTML = '⚠ Не настроена ссылка <code>TICKETS_CSV_URL</code>';
    return;
  }

  try {
    const [ticketsRes, configRes, viewersRes] = await Promise.allSettled([
      fetch(TICKETS_CSV_URL),
      CONFIG_CSV_URL && CONFIG_CSV_URL !== 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4e5Snl5FT-EdbjHQKKML7Ze1kNgpYcgx2MtrYWmkIPK32fHBTRfw7i3aKckWVvT6OoOQfOrQlyD6_/pubhtml?gid=222000002&single=true'
        ? fetch(CONFIG_CSV_URL) : Promise.resolve(null),
      VIEWERS_CSV_URL && VIEWERS_CSV_URL !== 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4e5Snl5FT-EdbjHQKKML7Ze1kNgpYcgx2MtrYWmkIPK32fHBTRfw7i3aKckWVvT6OoOQfOrQlyD6_/pubhtml?gid=222000001&single=true'
        ? fetch(VIEWERS_CSV_URL) : Promise.resolve(null),
    ]);

    if (viewersRes.status === 'fulfilled' && viewersRes.value && viewersRes.value.ok) {
      viewersMap = rowsToViewers(parseCSV(await viewersRes.value.text()));
    }

    if (configRes.status === 'fulfilled' && configRes.value && configRes.value.ok) {
      setupHeader(rowsToConfig(parseCSV(await configRes.value.text())));
    } else {
      setupHeader({});
    }

    if (ticketsRes.status === 'rejected' || !ticketsRes.value.ok) {
      throw new Error('Не удалось загрузить лист Tickets');
    }
    allTickets = rowsToTickets(parseCSV(await ticketsRes.value.text()), viewersMap);

    if (allTickets.length === 0) {
      status.innerHTML = '🎟️ Пока ни у кого нет билетов. Заходи на стрим — копи билеты!';
      return;
    }

    applyFilters();
    status.style.display = 'none';
    content.style.display = 'block';
  } catch (err) {
    status.classList.add('error');
    status.innerHTML = '⚠ Ошибка: ' + esc(err.message);
  }
}

loadAll();
setInterval(loadAll, 60000);
</script>
