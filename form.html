<script>
// ============================================================
// Утилиты
// ============================================================
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i + 1];
    if (inQ) {
      if (c === '"' && n === '"') { cell += '"'; i++; }
      else if (c === '"') inQ = false;
      else cell += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (c === '\r') {}
      else cell += c;
    }
  }
  if (cell.length > 0 || row.length > 0) { row.push(cell); if (row.some(c => c.length > 0)) rows.push(row); }
  return rows;
}

function initials(nick) {
  const clean = nick.replace(/[^A-Za-zА-Яа-я0-9]/g, '');
  if (clean.length >= 2) return (clean[0] + clean[1]).toUpperCase();
  return (clean[0] || '?').toUpperCase();
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============================================================
// Стримеры (из Config или дефолт)
// ============================================================
const STREAMER_SLOTS = [
  { id: 'PariPariKai', klass: 's-ppk',    bodyClass: 'streamer-ppk' },
  { id: 'Ilyich116',   klass: 's-ilyich', bodyClass: 'streamer-ilyich' },
  { id: 'd1psy_off',   klass: 's-dipsy',  bodyClass: 'streamer-dipsy' },
];

let streamerData = {
  'PariPariKai': { nick: 'PariPariKai', avatar: '' },
  'Ilyich116':   { nick: 'Ilyich116',   avatar: '' },
  'd1psy_off':   { nick: 'd1psy_off',   avatar: '' },
};

let viewersList = []; // [{nick, avatar}]
let selectedStreamer = null;
let sessionEntries = []; // последние выдачи в этой сессии

// ============================================================
// Загрузка Viewers и Config
// ============================================================
async function loadViewers() {
  try {
    const res = await fetch(VIEWERS_CSV_URL);
    if (!res.ok) return;
    const rows = parseCSV(await res.text());
    if (rows.length < 2) return;
    const headers = rows[0].map(h => h.trim().toLowerCase());
    const nickIdx = headers.indexOf('ник') >= 0 ? headers.indexOf('ник') : headers.indexOf('nick');
    const avatarIdx = headers.indexOf('аватар') >= 0 ? headers.indexOf('аватар') : headers.indexOf('avatar_url');
    if (nickIdx < 0) return;
    viewersList = rows.slice(1)
      .filter(r => r.length > 0 && r[nickIdx] && r[nickIdx].trim())
      .map(r => ({
        nick: r[nickIdx].trim(),
        avatar: avatarIdx >= 0 ? (r[avatarIdx] || '').trim() : ''
      }));
  } catch (e) { console.error('Viewers load failed', e); }
}

async function loadConfig() {
  if (!CONFIG_CSV_URL || CONFIG_CSV_URL.startsWith('PASTE_')) return;
  try {
    const res = await fetch(CONFIG_CSV_URL);
    if (!res.ok) return;
    const rows = parseCSV(await res.text());
    if (rows.length < 2) return;
    const headers = rows[0].map(h => h.trim().toLowerCase());
    const keyIdx = headers.indexOf('key');
    const valIdx = headers.indexOf('value');
    if (keyIdx < 0 || valIdx < 0) return;
    const config = {};
    rows.slice(1).forEach(r => {
      if (r[keyIdx]) config[r[keyIdx].trim().toLowerCase()] = (r[valIdx] || '').trim();
    });
    // Карты streamer1/2/3 → PariPariKai/Ilyich116/d1psy_off
    const slots = ['PariPariKai', 'Ilyich116', 'd1psy_off'];
    for (let i = 1; i <= 3; i++) {
      const nick = config[`streamer${i}_nick`];
      const avatar = config[`streamer${i}_avatar_url`];
      if (nick && streamerData[nick]) {
        streamerData[nick].avatar = avatar || '';
      } else if (nick && slots[i-1]) {
        // Если ник в Config отличается от стандартного — переименуем (не должно случаться, но на всякий)
        streamerData[slots[i-1]] = { nick: nick, avatar: avatar || '' };
      }
    }
  } catch (e) { console.error('Config load failed', e); }
}

// ============================================================
// Рендер карточек стримеров
// ============================================================
function renderStreamers() {
  const container = document.getElementById('streamers');
  container.innerHTML = STREAMER_SLOTS.map(slot => {
    const s = streamerData[slot.id];
    const avatarHtml = s.avatar
      ? `<div class="streamer-avatar" style="background-image:url('${esc(s.avatar)}');"></div>`
      : `<div class="streamer-avatar">${esc(initials(s.nick))}</div>`;
    return `
      <div class="streamer-card ${slot.klass}" data-id="${esc(slot.id)}" data-body="${slot.bodyClass}">
        ${avatarHtml}
        <div class="streamer-nick">${esc(s.nick)}</div>
        <div class="check-icon">✓</div>
      </div>
    `;
  }).join('');

  // Обработчики кликов
  document.querySelectorAll('.streamer-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      const bodyClass = card.dataset.body;
      selectStreamer(id, bodyClass);
    });
  });
}

function selectStreamer(id, bodyClass) {
  selectedStreamer = id;
  // Снимаем active со всех, ставим только на выбранный
  document.querySelectorAll('.streamer-card').forEach(c => {
    c.classList.toggle('active', c.dataset.id === id);
  });
  // Подсветка всей страницы
  document.body.classList.remove('streamer-ppk', 'streamer-ilyich', 'streamer-dipsy');
  document.body.classList.add(bodyClass);
  // Лейбл в шапке
  document.getElementById('active-streamer-label').textContent = streamerData[id].nick;
  // Сохраним последний выбор
  try { localStorage.setItem('last_streamer', id); } catch(e) {}
  updateSubmitState();
}

// ============================================================
// Автодополнение ника
// ============================================================
const nickInput = document.getElementById('nick-input');
const acList = document.getElementById('autocomplete-list');
const newNickWarning = document.getElementById('new-nick-warning');
let acHighlightIdx = -1;

function updateAutocomplete() {
  const q = nickInput.value.trim().toLowerCase();
  acHighlightIdx = -1;

  // Если поле пустое — скрыть всё
  if (!q) {
    acList.classList.remove('active');
    newNickWarning.classList.remove('active');
    updateSubmitState();
    return;
  }

  // Поиск по подстроке
  const matches = viewersList
    .filter(v => v.nick.toLowerCase().includes(q))
    .slice(0, 5);

  if (matches.length === 0) {
    acList.classList.remove('active');
    // Проверим — есть ли точное совпадение
    const exact = viewersList.find(v => v.nick.toLowerCase() === q);
    if (!exact) newNickWarning.classList.add('active');
    else newNickWarning.classList.remove('active');
  } else {
    // Если первый матч — точное совпадение, не показываем warning
    const exact = viewersList.find(v => v.nick.toLowerCase() === q);
    newNickWarning.classList.toggle('active', !exact);

    acList.innerHTML = matches.map((v, i) => {
      const avatarStyle = v.avatar ? `background-image:url('${esc(v.avatar)}');` : '';
      return `
        <div class="autocomplete-item" data-nick="${esc(v.nick)}" data-idx="${i}">
          <div class="autocomplete-avatar" style="${avatarStyle}"></div>
          <div class="autocomplete-nick">${esc(v.nick)}</div>
        </div>
      `;
    }).join('');
    acList.classList.add('active');

    acList.querySelectorAll('.autocomplete-item').forEach(item => {
      item.addEventListener('mousedown', (e) => {
        e.preventDefault();
        nickInput.value = item.dataset.nick;
        acList.classList.remove('active');
        newNickWarning.classList.remove('active');
        updateSubmitState();
      });
    });
  }

  updateSubmitState();
}

nickInput.addEventListener('input', updateAutocomplete);
nickInput.addEventListener('focus', updateAutocomplete);
nickInput.addEventListener('blur', () => {
  setTimeout(() => acList.classList.remove('active'), 150);
});

nickInput.addEventListener('keydown', (e) => {
  const items = acList.querySelectorAll('.autocomplete-item');
  if (e.key === 'ArrowDown' && items.length) {
    e.preventDefault();
    acHighlightIdx = Math.min(acHighlightIdx + 1, items.length - 1);
    items.forEach((it, i) => it.classList.toggle('highlight', i === acHighlightIdx));
  } else if (e.key === 'ArrowUp' && items.length) {
    e.preventDefault();
    acHighlightIdx = Math.max(acHighlightIdx - 1, 0);
    items.forEach((it, i) => it.classList.toggle('highlight', i === acHighlightIdx));
  } else if (e.key === 'Enter' && acHighlightIdx >= 0 && items[acHighlightIdx]) {
    e.preventDefault();
    nickInput.value = items[acHighlightIdx].dataset.nick;
    acList.classList.remove('active');
    newNickWarning.classList.remove('active');
    updateSubmitState();
  }
});

// ============================================================
// Количество (+/−)
// ============================================================
const countInput = document.getElementById('count-input');
document.getElementById('count-minus').addEventListener('click', () => {
  const v = parseInt(countInput.value, 10) || 1;
  countInput.value = Math.max(1, v - 1);
  updateSubmitState();
});
document.getElementById('count-plus').addEventListener('click', () => {
  const v = parseInt(countInput.value, 10) || 1;
  countInput.value = Math.min(100, v + 1);
  updateSubmitState();
});
countInput.addEventListener('input', updateSubmitState);
document.getElementById('source-select').addEventListener('change', updateSubmitState);

// ============================================================
// Submit
// ============================================================
function updateSubmitState() {
  const nick = nickInput.value.trim();
  const source = document.getElementById('source-select').value;
  const count = parseInt(countInput.value, 10);
  const ok = selectedStreamer && nick.length > 0 && source && count >= 1 && count <= 100;
  document.getElementById('submit-btn').disabled = !ok;
}

const submitBtn = document.getElementById('submit-btn');
const notice = document.getElementById('notice');

async function submitTicket() {
  if (submitBtn.disabled) return;

  const streamer = selectedStreamer;
  const nick = nickInput.value.trim();
  const source = document.getElementById('source-select').value;
  const count = parseInt(countInput.value, 10);

  submitBtn.disabled = true;
  showNotice('loading', '⏳ Отправляю...');

  try {
    const passwordHash = await sha256(currentPassword);
    const payload = {
      passwordHash: passwordHash,
      streamer: streamer,
      nick: nick,
      source: source,
      count: count,
    };
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
      // Apps Script не любит preflight CORS — используем text/plain
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);

    const data = await res.json();

    if (!data.ok) {
      showNotice('error', '❌ ' + (data.message || 'Ошибка сервера'));
      submitBtn.disabled = false;
      return;
    }

    // Успех!
    showNotice('success', `✓ Выдано: ${count} билет(ов) · ${nick} · ${source}`);
    addSessionEntry({ streamer: streamer, nick: nick, source: source, count: count });

    // Сбросить поля (стримера оставляем)
    nickInput.value = '';
    document.getElementById('source-select').value = '';
    countInput.value = '1';
    newNickWarning.classList.remove('active');
    acList.classList.remove('active');
    updateSubmitState();
    nickInput.focus();

    // Через 5 секунд скрыть уведомление
    setTimeout(() => {
      if (notice.classList.contains('success')) hideNotice();
    }, 5000);

  } catch (err) {
    showNotice('error', '❌ Ошибка сети: ' + err.message);
    submitBtn.disabled = false;
  }
}

submitBtn.addEventListener('click', submitTicket);

function showNotice(type, text) {
  notice.className = 'notice ' + type;
  notice.textContent = text;
}
function hideNotice() {
  notice.className = 'notice';
  notice.textContent = '';
}

// ============================================================
// Лог последних выдач в сессии
// ============================================================
function addSessionEntry(entry) {
  sessionEntries.unshift(entry);
  if (sessionEntries.length > 6) sessionEntries.pop();
  renderSessionEntries();
}

function renderSessionEntries() {
  const wrap = document.getElementById('last-entries');
  const list = document.getElementById('last-entries-list');
  if (sessionEntries.length === 0) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'block';

  const colorMap = {
    'PariPariKai': 'var(--ppk-color)',
    'Ilyich116':   'var(--ilyich-color)',
    'd1psy_off':   'var(--dipsy-color)',
  };

  list.innerHTML = sessionEntries.map(e => `
    <div class="last-entry">
      <span class="last-entry-dot" style="background:${colorMap[e.streamer]};"></span>
      <strong>${esc(e.nick)}</strong> · ${esc(e.source)} · ×${e.count}
    </div>
  `).join('');
}

// ============================================================
// Авторизация
// ============================================================
let currentPassword = null;

async function tryLogin(password) {
  const hash = await sha256(password);
  if (hash === PASSWORD_HASH) {
    currentPassword = password;
    try { localStorage.setItem('form_auth', password); } catch(e) {}
    enterApp();
    return true;
  }
  return false;
}

async function enterApp() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').classList.add('active');

  // Загружаем данные
  await Promise.all([loadConfig(), loadViewers()]);
  renderStreamers();

  // Восстанавливаем последний выбор стримера
  let lastStreamer = null;
  try { lastStreamer = localStorage.getItem('last_streamer'); } catch(e) {}
  if (lastStreamer && streamerData[lastStreamer]) {
    const slot = STREAMER_SLOTS.find(s => s.id === lastStreamer);
    if (slot) selectStreamer(lastStreamer, slot.bodyClass);
  }

  nickInput.focus();
}

// Логин по форме
document.getElementById('gate-submit').addEventListener('click', async () => {
  const input = document.getElementById('gate-input');
  const errorEl = document.getElementById('gate-error');
  errorEl.textContent = '';
  const pw = input.value.trim();
  if (!pw) return;

  if (!PASSWORD_HASH || PASSWORD_HASH.startsWith('PASTE_')) {
    errorEl.textContent = 'Не настроен PASSWORD_HASH в коде';
    return;
  }

  const ok = await tryLogin(pw);
  if (!ok) {
    errorEl.textContent = 'Неверный код';
    input.value = '';
    input.focus();
  }
});

document.getElementById('gate-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('gate-submit').click();
});

// Logout
document.getElementById('logout-btn').addEventListener('click', () => {
  if (!confirm('Выйти из защищённой формы? Придётся снова ввести код.')) return;
  try { localStorage.removeItem('form_auth'); } catch(e) {}
  currentPassword = null;
  document.body.classList.remove('streamer-ppk', 'streamer-ilyich', 'streamer-dipsy');
  document.getElementById('app').classList.remove('active');
  document.getElementById('gate').style.display = 'block';
  document.getElementById('gate-input').value = '';
  document.getElementById('gate-input').focus();
});

// Автологин из localStorage
(async () => {
  try {
    const saved = localStorage.getItem('form_auth');
    if (saved) {
      const ok = await tryLogin(saved);
      if (!ok) localStorage.removeItem('form_auth');
    }
  } catch(e) {}
  document.getElementById('gate-input').focus();
})();
</script>
